name: Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check server syntax
      run: node -c src/server/server.js

    - name: Verify project structure
      run: |
        [ -f "src/server/server.js" ] && echo "✅ server.js found" || (echo "❌ server.js missing" && exit 1)
        [ -f "src/public/index.html" ] && echo "✅ index.html found" || (echo "❌ index.html missing" && exit 1)
        [ -f "Procfile" ] && echo "✅ Procfile found" || (echo "❌ Procfile missing" && exit 1)
        echo "✅ All checks passed"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to Heroku
      uses: akhileshns/heroku-deploy@v3.12.12
      with:
        heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
        heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
        heroku_email: ${{ secrets.HEROKU_EMAIL }}
        buildpack: "heroku/nodejs"
      env:
        HD_EMAIL_USER: ${{ secrets.EMAIL_USER }}
        HD_EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        HD_ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        HD_NODE_ENV: production
        HD_ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

    - name: Notify result
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment successful!"
        else
          echo "❌ Deployment failed!"
        fi
